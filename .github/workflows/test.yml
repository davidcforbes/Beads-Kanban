name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Run VS Code extension tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test

    - name: Run VS Code extension tests (non-Linux)
      if: runner.os != 'Linux'
      run: npm test

    - name: Verify VSIX package builds
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      run: |
        npx @vscode/vsce package --no-dependencies
        FILECOUNT=$(npx @vscode/vsce ls *.vsix 2>/dev/null | wc -l)
        echo "VSIX contains $FILECOUNT files"
        if [ "$FILECOUNT" -gt 50 ]; then
          echo "ERROR: VSIX has too many files ($FILECOUNT). Expected under 50. Bundling may be broken."
          exit 1
        fi

